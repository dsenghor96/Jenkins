services:

  mongodb:
    image: mongo:7
    container_name: portfolio_mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    networks:
      - portfolio-network

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: portfolio_backend
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/portfolio_perso
      - PORT=3000
      - CLIENT_ORIGIN=http://localhost:5173
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./ux_react
      dockerfile: Dockerfile
    container_name: portfolio_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - portfolio-network

  sonarqube:
    image: sonarqube:lts-community
    container_name: portfolio_sonarqube
    restart: unless-stopped
    depends_on:
      - sonarqube-db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD=sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    ports:
      - "9000:9000"
    ulimits:
      nofile:
        soft: 131072
        hard: 131072
      nproc: 8192
    networks:
      - portfolio-network

  sonarqube-db:
    image: postgres:16-alpine
    container_name: portfolio_sonarqube_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=sonar
      - POSTGRES_PASSWORD=sonar
      - POSTGRES_DB=sonarqube
    volumes:
      - sonarqube_db:/var/lib/postgresql/data
    networks:
      - portfolio-network

volumes:
  mongodb_data:
  uploads_data:
  jenkins_home:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonarqube_db:

networks:
  portfolio-network:
    driver: bridge
